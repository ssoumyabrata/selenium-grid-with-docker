name: Selenium Tests with Docker Compose

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker compose -f dc-hub.yml build
      
      - name: Start services and run tests
        run: docker compose -f dc-hub.yml up --abort-on-container-exit

      - name: Fix File Permissions
        if: always()
        run: sudo chmod -R 777 target
              
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.34.1.tgz
          tar -zxvf allure-2.34.1.tgz
          sudo mv allure-2.34.1 /opt/allure
          echo "/opt/allure/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate target/allure-results -o target/allure-report --clean

      - name: Upload Github Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots

      - name: Shutdown Docker
        if: always()
        run: docker compose -f dc-hub.yml down
      

      

  # Optional: Create a summary badge
  summary:
    runs-on: ubuntu-latest
    if: always()
    needs: test
    steps:
      - name: Test Summary
        run: |
          echo "✅ Tests completed. Check Artifacts for reports."